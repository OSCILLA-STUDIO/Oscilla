<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oscilla</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --fg: #f0f0ee;
    --muted: #666;
    --border: rgba(240,240,238,0.1);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--fg);
    font-weight: 300;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2rem 3rem;
    z-index: 100;
    background: linear-gradient(to bottom, rgba(10,10,10,0.8), rgba(10,10,10,0));
    pointer-events: none;
  }
  
  nav a { pointer-events: auto; }

  .logo {
    font-size: 1rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--fg);
    text-decoration: none;
    font-weight: 400;
  }

  .nav-contact {
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  .nav-contact:hover { color: var(--fg); }

  /* HERO */
  .hero {
    height: 100vh;
    display: flex;
    align-items: flex-end;
    padding: 0 3rem 4rem;
  }

  .hero-title {
    font-size: clamp(3.5rem, 8vw, 7rem);
    font-weight: 300;
    letter-spacing: -0.02em;
    line-height: 0.9;
    color: var(--fg);
  }

  /* SECTIONS */
  section {
    padding: 8rem 3rem;
    border-top: 1px solid var(--border);
  }

  .section-label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4rem;
  }

  /* VIDEO STACK (Élargie pour plus d'impact visuel) */
  .video-stack {
    display: flex;
    flex-direction: column;
    gap: 4rem; /* Plus d'espace entre les éléments pour respirer */
    max-width: 1300px; /* Passage de 1000px à 1300px */
    margin-bottom: 4rem;
  }

  .video-item {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .video-slot {
    aspect-ratio: 16/9;
    position: relative;
    overflow: hidden;
    background: #111;
    border: 1px solid rgba(240,240,238,0.05);
    transition: border-color 0.3s ease;
  }

  .video-slot:hover {
    border-color: rgba(240,240,238,0.2);
  }

  .video-slot iframe {
    width: 100%;
    height: 100%;
    display: block;
    border: 0;
  }

  /* CAPTION */
  .video-caption {
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--fg);
    font-weight: 300;
  }

  /* SOUNDCLOUD BLOCK (Aligné sur la taille des vidéos) */
  .soundcloud-block {
    max-width: 1300px;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .soundcloud-item {
    border: 1px solid rgba(240,240,238,0.05);
    background: #111;
    overflow: hidden;
  }

  .soundcloud-item iframe {
    border: 0;
    display: block;
  }

  .soundcloud-meta {
    font-size: 11px;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    letter-spacing: 0.05em;
    margin-top: 0.2rem;
  }

  .soundcloud-meta a {
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  .soundcloud-meta a:hover {
    color: var(--fg);
  }

  /* VIDEO GRID (Musique) */
  .video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
    gap: 20px; 
    max-width: 1300px;
  }

  .video-slot-placeholder {
    width: 100%;
    height: 100%;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    aspect-ratio: 16/9;
  }

  .video-slot-placeholder span {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #444;
  }

  /* PRESTATIONS */
  .prestations-text {
    max-width: 1000px;
  }

  .prestations-text p {
    font-size: 1.1rem;
    line-height: 1.8;
    color: var(--fg);
    font-weight: 300;
  }

  /* FOOTER */
  footer {
    padding: 4rem 3rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  footer span {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

    font-size: 0.72rem;
    letter-spacing:
