<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oscilla</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-main: #0a0a0a;
    --bg-alt: #121212; /* Gris très sombre pour casser le total noir */
    --card-bg: #1a1a1a; /* Fond des blocs de contenu */
    --fg: #f5f5f3;
    --muted: #8a8a8a; /* Éclairci pour une meilleure lisibilité */
    --border: rgba(240,240,238,0.15);
    --accent: #ff5500; /* Orange SoundCloud discret pour les détails */
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-main);
    color: var(--fg);
    font-weight: 300;
    line-height: 1.6;
  }

  /* Barre de navigation style "Verre dépoli" */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.5rem 3rem;
    z-index: 100;
    background: rgba(10, 10, 10, 0.75);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-size: 1.1rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--fg);
    text-decoration: none;
    font-weight: 500;
  }

  .nav-contact {
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
    font-weight: 400;
  }

  .nav-contact:hover { color: var(--fg); }

  /* HERO SECTION */
  .hero {
    height: 90vh;
    display: flex;
    align-items: flex-end;
    padding: 0 3rem 6rem;
    background: radial-gradient(circle at top right, #1a1a1a 0%, var(--bg-main) 70%);
  }

  .hero-title {
    font-size: clamp(4rem, 10vw, 8rem);
    font-weight: 400;
    letter-spacing: -0.03em;
    line-height: 0.85;
    color: var(--fg);
    text-transform: uppercase;
  }

  /* STRUCTURE DES SECTIONS (Alternance de fonds) */
  section {
    padding: 8rem 3rem;
    border-top: 1px solid var(--border);
  }
  
  #travaux { background: var(--bg-main); }
  #musique { background: var(--bg-alt); }
  #prestations { background: var(--bg-main); }

  .section-label {
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4rem;
    font-weight: 500;
    display: inline-block;
    border-left: 2px solid var(--accent);
    padding-left: 0.75rem;
  }

  /* CONTENEURS ÉLARGIS ET FLUIDES */
  .video-stack {
    display: flex;
    flex-direction: column;
    gap: 4.5rem;
    max-width: 1300px;
    margin-bottom: 5rem;
  }

  /* Style des cartes de contenu */
  .video-item, .soundcloud-block {
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
    background: var(--card-bg);
    padding: 1.5rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    box-shadow: 0
