<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oscilla</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --fg: #f0f0ee;
    --muted: #888888;
    --border: rgba(240,240,238,0.15);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--fg);
    font-weight: 300;
    padding-bottom: 5rem;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2rem 3rem;
    z-index: 100;
    background: linear-gradient(to bottom, rgba(10,10,10,0.9), rgba(10,10,10,0));
  }

  .logo {
    font-size: 1rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--fg);
    text-decoration: none;
    font-weight: 400;
  }

  .nav-contact {
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  .nav-contact:hover { color: var(--fg); }

  /* HERO */
  .hero {
    height: 70vh;
    display: flex;
    align-items: flex-end;
    padding: 0 3rem 4rem;
  }

  .hero-title {
    font-size: clamp(3.5rem, 8vw, 7rem);
    font-weight: 300;
    letter-spacing: -0.02em;
    line-height: 0.9;
    color: var(--fg);
  }

  /* SECTIONS */
  section {
    padding: 6rem 3rem;
    border-top: 1px solid var(--border);
  }

  .section-label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 3rem;
  }

  /* VIDEO STACK */
  .video-stack {
    display: flex;
    flex-direction: column;
    gap: 4rem;
    max-width: 1300px;
    width: 100%;
  }

  .video-item {
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
    width: 100%;
  }

  .video-slot {
    aspect-ratio: 16/9;
    position: relative;
    overflow: hidden;
    background: #111111;
    border: 1px solid var(--border);
  }

  .video-slot iframe {
    width: 100%;
    height: 100%;
    display: block;
    border: 0;
  }

  /* CAPTION */
  .video-caption {
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--fg);
    font-weight: 300;
    margin-top: 0.2rem;
  }

  /* SOUNDCLOUD */
  .soundcloud-item {
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
    max-width: 1300px;
    width: 100%;
    margin-top: 4rem;
  }

  .soundcloud-wrapper {
    width: 100%;
    border: 1px solid var(--border);
    background: #111111;
    overflow: hidden;
  }

  .soundcloud-wrapper iframe {
    border: 0;
    display: block;
    width: 100%;
  }

  /* PRESTATIONS */
  .prestations-text {
    max-width: 1000px;
  }

  .prestations-text p {
    font-size: 1.1rem;
    line-height: 1.7;
    color: var(--fg);
    font-weight: 300;
  }

  /* FOOTER */
  footer {
    padding: 3rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1300px;
    margin: 0 auto;
  }

  footer span {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  footer a {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  footer a:hover { color: var(--fg); }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    nav { padding: 1.5rem; }
    section { padding: 4rem 1.5rem; }
    .hero { padding: 0 1.5rem 3rem; height: 50vh; }
  }
</style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">Oscilla</a>
  <a class="nav-contact" href="contact.html">Contact</a>
</nav>

<div class="hero">
  <h1 class="hero-title">Oscilla</h1>
</div>

<section id="travaux">
  <div class="section-label">Travaux</div>

  <div class="video-stack">

    <div class="video-item">
      <div class="video-slot">
        <iframe
          src="https://www.youtube.com/embed/qdQNnPigP8Q"
          allow="autoplay; encrypted-media"
          allowfullscreen>
        </iframe>
      </div>
      <span class="video-caption">Montage son</span>
    </div>

    <div class="video-item">
      <div class="video-slot">
        <iframe
          src="https://www.instagram.com/reel/DYaMw36u9Tk/embed"
          allow="autoplay; encrypted-media"
          allowfullscreen>
        </iframe>
      </div>
      <span class="video-caption">Montage son / Mixage</span>
    </div>

    <div class="video-item">
      <div class="video-slot">
        <iframe
          src="https://www.youtube.com/embed/AXJU51HyO40"
          allow="autoplay; encrypted-media"
          allowfullscreen>
        </iframe>
      </div>
      <span class="video-caption">Sound Design / Mix</span>
    </div>

  </div>

  <div class="soundcloud-item">
    <div class="soundcloud-wrapper">
      <iframe width="100%" height="300" scrolling="no" frameborder="no" allow="autoplay; encrypted-media" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/soundcloud%3Atracks%3A2033779792%3Fsecret_token%3Ds-Wf7AGX2xMyl&color=%23ff5500&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true&visual=true"></iframe>
    </div>
    <span class="video-caption">Tournage / Montage son</span>
  </div>

</section>

<section id="prestations">
  <div class="section-label">Prestations</div>
  <div class="prestations-text">
    <p>Oscilla assure la prise de son sur le terrain — tournages et événements live.</p>
  </div>
</section>

<footer>
  <span>Oscilla</span>
  <a href="contact.html">Contact</a>
</footer>

</body>
</html>
