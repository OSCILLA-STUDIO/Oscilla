<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oscilla — Contact</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --fg: #f0f0ee;
    --muted: #666;
    --border: rgba(240,240,238,0.1);
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--fg);
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2rem 3rem;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-size: 1rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--fg);
    text-decoration: none;
    font-weight: 400;
  }

  .nav-back {
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  .nav-back:hover { color: var(--fg); }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    padding: 0 3rem;
  }

  .contact-block {
    padding: 6rem 0;
  }

  .contact-label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2rem;
  }

  .contact-email {
    font-size: clamp(1.2rem, 3vw, 2rem);
    font-weight: 300;
    letter-spacing: -0.01em;
    color: var(--fg);
    text-decoration: none;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.5rem;
    transition: border-color 0.2s;
  }

  .contact-email:hover {
    border-color: var(--fg);
  }

  footer {
    padding: 2rem 3rem;
    border-top: 1px solid var(--border);
  }

  footer span {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    color: var(--muted);
  }
</style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">Oscilla</a>
  <a class="nav-back" href="index.html">← Retour</a>
</nav>

<main>
  <div class="contact-block">
    <div class="contact-label">Contact</div>
    <a class="contact-email" href="mailto:oscilla.studio@protonmail.com">
      oscilla.studio@protonmail.com
    </a>
  </div>
</main>

<footer>
  <span>Oscilla</span>
</footer>

</body>
</html>
